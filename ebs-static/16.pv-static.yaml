apiVersion: v1
kind: PersistentVolume
metadata:
  name: my-pv-static
spec:
  capacity:
    storage: 10Gi # Must be <= actual EBS volume size
  accessModes:
    - ReadWriteOnce # EBS supports only RWO
  persistentVolumeReclaimPolicy: Retain #Lifecycle policies: Retain, Recycle, Delete
  awsElasticBlockStore:
    volumeID: vol-09ef399cdc9e3c141 # EBS volume ID
