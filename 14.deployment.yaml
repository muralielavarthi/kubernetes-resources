apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 3
  selector:
    Project: Expense
    divison: Finance

---
apiVersion: v1
kind: Pod
metadata:
  name: pod-demo
  labels:
    Project: Expense
    divison: Finance
spec:
  containers:
    - name: nginx
      image: nginx:1.14.2
