apiVersion: v1
kind: Service
metadata:
  name: murali-nodeport-service
spec:
  type: NodePort
  selector:
    Project: Expense
    divison: Finance
  ports:
    - protocol: TCP
      port: 80 # Service port
      targetPort: 80 # Port on the Pod where the application is running
      nodePort: 30007 # Port on each node to expose the service
      # if not set, Kubernetes will automatically assign a port from the default range (30000-32767)

---
apiVersion: v1
kind: Pod
metadata:
  name: nginx1
  labels:
    Project: Expense
    divison: Finance
spec:
  containers:
    - name: nginx
      image: nginx:stable

---
apiVersion: v1
kind: Pod
metadata:
  name: nginx2
  labels:
    Project: Expense
    divison: Finance
spec:
  containers:
    - name: nginx
      image: nginx:stable
